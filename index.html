<!DOCTYPE html>
<html>
<head>
    <title>Beauty AI</title>
</head>
<body>

<h2>Beauty AI Chat</h2>

<input type="text" id="input" placeholder="Type here">
<button onclick="send()">Send</button>

<div id="output"></div>

<script>
async function send() {
    const prompt = document.getElementById("input").value;

    const role = "You are a beauty assistant";

    try {
        const res = await fetch(`http://localhost/api.php?role=${encodeURIComponent(role)}&prompt=${encodeURIComponent(prompt)}`);

        const text = await res.text(); // DEBUG
        console.log(text);

        const data = JSON.parse(text);

        if (data.error) {
            document.getElementById("output").innerText = data.error;
            return;
        }

        const reply = data.choices[0].message.content;

        document.getElementById("output").innerText = reply;

    } catch (err) {
        document.getElementById("output").innerText = "Error: " + err.message;
    }
}
</script>

</body>
</html>
